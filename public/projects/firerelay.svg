<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="750" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12121c"/>
      <stop offset="1" stop-color="#1a1528"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 320) rotate(90) scale(280)">
      <stop stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <rect width="1200" height="750" fill="url(#glow)"/>
  <rect x="80" y="80" width="1040" height="590" rx="24" stroke="#7c3aed" stroke-opacity="0.25" stroke-width="2" fill="#ffffff" fill-opacity="0.03"/>
  <text x="600" y="340" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700">FireRelay</text>
  <text x="600" y="400" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="24">Emergency Dispatch Monitoring</text>
  <text x="600" y="460" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="16">Screenshot coming soon</text>
</svg>
